# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - alphacrm

on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  VITE_MODE: ${{ secrets.VITE_MODE }}
  VITE_API_URL: ${{ secrets.VITE_API_URL }}
  VITE_WEBSITE_URL: ${{ secrets.VITE_WEBSITE_URL }}
  VITE_RELAY_TARGET: ${{ secrets.VITE_RELAY_TARGET }}
  VITE_TIMEOUT: ${{ secrets.VITE_TIMEOUT }}
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app  # explicitly download into the "node-app" folder
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'securesite'
          slot-name: 'Production'
          package: './node-app'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E59777F3AC2F4124938F88910F185BC7 }}